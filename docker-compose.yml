services:
  # Flask Backend API (PROMPT Step 1 + Step 3)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grocery-backend
    ports:
      - "8080:8080"
    volumes:
      - grocery-db:/data/db
      - grocery-receipts:/data/receipts
      - grocery-backups:/data/backups
    env_file:
      - .env
    depends_on:
      mqtt:
        condition: service_healthy
    networks:
      - grocery-internal
      - grocery-external
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Mosquitto MQTT Broker (PROMPT Step 4)
  mqtt:
    image: eclipse-mosquitto:2
    container_name: grocery-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - grocery-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Ollama LLM Runtime (PROMPT Step 10)
  ollama:
    image: ollama/ollama:latest
    container_name: grocery-ollama
    ports:
      - "11434:11434"
    volumes:
      - grocery-ollama:/root/.ollama
    networks:
      - grocery-internal
    restart: unless-stopped
    # Resource limits — Ollama is memory-intensive
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  grocery-db:
    driver: local
  grocery-receipts:
    driver: local
  grocery-ollama:
    driver: local
  grocery-backups:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local

networks:
  grocery-internal:
    driver: bridge
    internal: true
  grocery-external:
    driver: bridge
