# =============================================================================
# Home Assistant Dashboard Configuration
# PROMPT Reference: Phase 7, Step 21
#
# Import this into your Home Assistant configuration:
#   1. Copy this file to your HA config directory
#   2. Add to configuration.yaml: lovelace: !include home_assistant_dashboard_config.yaml
#   3. Restart Home Assistant
#
# Prerequisites:
#   - MQTT integration configured (broker: localhost:1883)
#   - REST integration for API endpoints (base URL: http://localhost:8080)
# =============================================================================

