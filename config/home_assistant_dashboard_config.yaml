# --- Dashboard Layout ---
title: "🛒 Grocery Manager"
views:

  # ===== OVERVIEW TAB =====
  - title: Overview
    path: grocery-overview
    icon: mdi:cart-outline
    badges: []
    cards:

      # --- Quick Stats ---
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.grocery_recommendations
            name: "Today's Suggestions"
            icon: mdi:lightbulb-on

          - type: entity
            entity: sensor.grocery_budget_alert
            name: "Budget Used"
            icon: mdi:cash-register

          - type: entity
            entity: sensor.grocery_low_stock_alert
            name: "Low Stock"
            icon: mdi:alert-circle

      # --- Low Stock Alerts ---
      - type: markdown
        title: "🔔 Low Stock Alerts"
        content: >
          {% set alert = state_attr('sensor.grocery_low_stock_alert', 'name') %}
          {% if alert %}
          **{{ state_attr('sensor.grocery_low_stock_alert', 'name') }}** is running low!

          Current: {{ state_attr('sensor.grocery_low_stock_alert', 'current') }}
          Threshold: {{ state_attr('sensor.grocery_low_stock_alert', 'threshold') }}
          {% else %}
          ✅ All items are well-stocked.
          {% endif %}

      # --- Daily Recommendations ---
      - type: markdown
        title: "💡 Today's Recommendations"
        content: >
          {% set recs = state_attr('sensor.grocery_recommendations', 'recommendations') %}
          {% if recs %}
          {% for rec in recs[:5] %}
          - **{{ rec.product_name }}** — {{ rec.message }}
            _(confidence: {{ rec.confidence }})_
          {% endfor %}
          {% else %}
          No recommendations today.
          {% endif %}

      # --- Budget Status ---
      - type: markdown
        title: "💰 Monthly Budget"
        content: >
          {% set pct = state_attr('sensor.grocery_budget_alert', 'percentage') or 0 %}
          {% set spent = state_attr('sensor.grocery_budget_alert', 'spent') or 0 %}
          {% set budget = state_attr('sensor.grocery_budget_alert', 'budget_amount') or 0 %}
          **{{ pct }}%** of budget used

          Spent: ${{ spent }} / ${{ budget }}
          {% if pct >= 80 %}
          ⚠️ Over 80% — watch your spending!
          {% endif %}

  # ===== INVENTORY TAB =====
  - title: Inventory
    path: grocery-inventory
    icon: mdi:fridge-outline
    cards:

      # --- Inventory by Location ---
      - type: markdown
        title: "📦 Current Inventory"
        content: >
          Use the REST API to view inventory:
          `GET http://localhost:8080/inventory`

          **Locations:**
          - 🧊 Fridge
          - 🥫 Pantry
          - ❄️ Freezer
          - 🗄️ Cabinet

      # --- Quick Actions ---
      - type: vertical-stack
        title: "Quick Actions"
        cards:
          - type: button
            name: "Upload Receipt"
            icon: mdi:camera
            tap_action:
              action: url
              url_path: "http://localhost:8080/receipts/upload"

          - type: button
            name: "View Low Stock"
            icon: mdi:alert
            tap_action:
              action: url
              url_path: "http://localhost:8080/inventory?low_stock=true"

  # ===== ANALYTICS TAB =====
  - title: Analytics
    path: grocery-analytics
    icon: mdi:chart-line
    cards:

      - type: markdown
        title: "📊 Spending Analytics"
        content: >
          Access analytics via the API:

          - **Monthly spending:** `GET /analytics/spending?period=monthly`
          - **By category:** `GET /analytics/spending?category=dairy`
          - **Price trends:** `GET /analytics/price-history?product_id=1`
          - **Deals captured:** `GET /analytics/deals-captured`
          - **Store comparison:** `GET /analytics/store-comparison?product_id=1`

      - type: markdown
        title: "🏪 Store Comparison"
        content: >
          Compare prices across stores via:
          `GET http://localhost:8080/analytics/store-comparison?product_id=1`
